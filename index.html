<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pencarian Juz Al-Qur'an</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #3b0000, #1f4d1f, #665500);
      color:white;
      min-height:100vh;
      padding:30px;
    }

    .container{
      max-width:900px;
      margin:auto;
      background: rgba(0,0,0,0.45);
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      color:#ffe066;
    }

    .creator{
      text-align:center;
      margin-bottom:20px;
      color:#c7ff95;
      font-size:15px;
    }

    .creator a{
      color:#ff8c8c;
      text-decoration:none;
      font-weight:bold;
    }

    select{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:16px;
      margin-bottom:25px;
      background:#222;
      color:white;
      outline:none;
    }

    .hasil{
      background: rgba(255,255,255,0.08);
      padding:20px;
      border-radius:15px;
      border-left:6px solid #ffe066;
      animation: fade 0.4s ease;
    }

    .hasil h2{
      color:#ffe066;
      margin-bottom:15px;
    }

    .ayat-box{
      background: rgba(0,0,0,0.35);
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      border-left:5px solid #7dff7d;
    }

    .ayat-box:hover{
      transform:scale(1.01);
      transition:0.2s;
    }

    .surat{
      color:#ffb3b3;
      font-weight:bold;
      margin-bottom:8px;
    }

    .ayat{
      line-height:1.7;
      color:#f1f1f1;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    footer{
      text-align:center;
      margin-top:30px;
      color:#ddd;
      font-size:14px;
    }

    footer a{
      color:#ffe066;
      text-decoration:none;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>📖 Pencarian Juz Al-Qur'an</h1>

    <div class="creator">
      Dibuat oleh <b>Azkaa</b><br><br>
      Instagram :
      <a href="https://www.instagram.com/kibaa.4k?igsh=MWM3czdkbTZsOGt2eQ==" target="_blank">
        @kibaa.4k
      </a>
    </div>

    <select id="pilihJuz">
      <option value="">-- Pilih Juz --</option>
    </select>

    <div class="hasil" id="hasil">
      <h2>Silakan pilih juz terlebih dahulu</h2>
    </div>

  </div>

  <footer>
    Website Islami © 2026 | Dibuat oleh Azkaa
  </footer>

  <script>

    const dataJuz = [
      {juz:1, isi:"Al-Fatihah 1 - Al-Baqarah 141"},
      {juz:2, isi:"Al-Baqarah 142 - 252"},
      {juz:3, isi:"Al-Baqarah 253 - Ali 'Imran 92"},
      {juz:4, isi:"Ali 'Imran 93 - An-Nisa' 23"},
      {juz:5, isi:"An-Nisa' 24 - 147"},
      {juz:6, isi:"An-Nisa' 148 - Al-Ma'idah 81"},
      {juz:7, isi:"Al-Ma'idah 82 - Al-An'am 110"},
      {juz:8, isi:"Al-An'am 111 - Al-A'raf 87"},
      {juz:9, isi:"Al-A'raf 88 - Al-Anfal 40"},
      {juz:10, isi:"Al-Anfal 41 - At-Taubah 92"},
      {juz:11, isi:"At-Taubah 93 - Hud 5"},
      {juz:12, isi:"Hud 6 - Yusuf 52"},
      {juz:13, isi:"Yusuf 53 - Ibrahim 52"},
      {juz:14, isi:"Al-Hijr 1 - An-Nahl 128"},
      {juz:15, isi:"Al-Isra' 1 - Al-Kahf 74"},
      {juz:16, isi:"Al-Kahf 75 - Taha 135"},
      {juz:17, isi:"Al-Anbiya' 1 - Al-Hajj 78"},
      {juz:18, isi:"Al-Mu'minun 1 - Al-Furqan 20"},
      {juz:19, isi:"Al-Furqan 21 - An-Naml 55"},
      {juz:20, isi:"An-Naml 56 - Al-'Ankabut 45"},
      {juz:21, isi:"Al-'Ankabut 46 - Al-Ahzab 30"},
      {juz:22, isi:"Al-Ahzab 31 - Yasin 27"},
      {juz:23, isi:"Yasin 28 - Az-Zumar 31"},
      {juz:24, isi:"Az-Zumar 32 - Fussilat 46"},
      {juz:25, isi:"Fussilat 47 - Al-Jasiyah 37"},
      {juz:26, isi:"Al-Ahqaf 1 - Az-Zariyat 30"},
      {juz:27, isi:"Az-Zariyat 31 - Al-Hadid 29"},
      {juz:28, isi:"Al-Mujadilah 1 - At-Tahrim 12"},
      {juz:29, isi:"Al-Mulk 1 - Al-Mursalat 50"},
      {juz:30, isi:"An-Naba' 1 - An-Nas 6"},
    ];

    const pilihJuz = document.getElementById("pilihJuz");
    const hasil = document.getElementById("hasil");

    dataJuz.forEach(data => {
      const option = document.createElement("option");
      option.value = data.juz;
      option.textContent = "Juz " + data.juz;
      pilihJuz.appendChild(option);
    });

    pilihJuz.addEventListener("change", function(){

      const juzDipilih = dataJuz.find(
        item => item.juz == this.value
      );

      if(juzDipilih){

        hasil.innerHTML = `
          <h2>Hasil Pencarian Juz ${juzDipilih.juz}</h2>

          <div class="ayat-box">
            <div class="surat">📚 Daftar Surat & Ayat</div>
            <div class="ayat">
              ${juzDipilih.isi}
            </div>
          </div>
        `;

      } else {

        hasil.innerHTML = `
          <h2>Silakan pilih juz terlebih dahulu</h2>
        `;

      }

    });

  </script>

</body>
</html
